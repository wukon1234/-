server:
  port: 8087
  servlet:
    context-path: /api

spring:
  application:
    name: mall-backend
  
  # 数据源配置
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/mall_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
    username: root
    password: 20030420
    druid:
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      time-between-eviction-runs-millis: 60000
      min-evictable-idle-time-millis: 300000
      validation-query: SELECT 1
      test-while-idle: true
      test-on-borrow: false
      test-on-return: false
  
  # Redis配置
  data:
    redis:
      host: localhost
      port: 6379
      password: 20030420
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: -1ms

# MyBatis Plus配置
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.mall.entity

# 日志配置
logging:
  level:
    com.mall: debug
    org.springframework: info
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{50} - %msg%n"

# JWT配置
jwt:
  secret: mall-secret-key-2024
  expiration: 86400000  # 24小时

# 大模型配置
llm:
#  # OpenAI配置（可选）
#  openai:
#    api-key: your-openai-api-key
#    base-url: https://api.openai.com/v1
#    model: gpt-3.5-turbo
#
  # 通义千问配置（可选）
  qwen:
    api-key: sk-1a4df20be5cb44e0ab482e77f7b713fe
    base-url: https://dashscope.aliyuncs.com/api
  
  # 默认使用的大模型提供商：openai, qwen, wenxin, spark
  provider: qwen

# 向量数据库配置
vector-db:
  # Chroma配置（开发环境）
  chroma:
    host: localhost
    port: 8000
    collection-name: products
  
  # Milvus配置（生产环境）
  milvus:
    host: localhost
    port: 19530
    collection-name: products
  
  # 使用的向量数据库类型：chroma, milvus
  type: chroma

## Embedding配置
#embedding:
#  # OpenAI Embedding
#  openai:
#    api-key: your-openai-api-key
#    base-url: https://api.openai.com/v1
#    model: text-embedding-ada-002
  
  # 通义千问Embedding
  qwen:
    api-key: sk-1a4df20be5cb44e0ab482e77f7b713fe
    model: text-embedding-v2
  
  # 默认使用的Embedding提供商
  provider: qwen

# 文件上传配置
file:
  upload-path: ./uploads
  max-size: 10485760  # 10MB

# RAG数据源配置
rag:
  # 启用的数据源列表（默认只启用商品数据源）
  enabled-sources:
    - product
  # 默认检索的数据源（如果不指定，使用此配置）
  default-source: product
  # 是否启用多数据源检索
  multi-source-enabled: false

  # 检索模式：keyword / vector
  # - keyword: 默认关键词检索（无需向量库）
  # - vector: 语义检索（需要 embedding.provider=openai + Chroma）
  search-mode: keyword
  # 是否开启向量检索能力（开启后仍可用search-mode控制是否使用）
  vector-enabled: false
  # 启动时是否自动同步商品向量（毕设数据量小可开启）
  vector-auto-sync: false